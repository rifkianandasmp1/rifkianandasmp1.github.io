<!DOCTYPE html>
<html lang="en">

<style>
  :root {
    --bg: #0f0d0b;
    --bg-elev: #161310;
    --ink: #f3ece1;
    --ink-soft: #c9bfae;
    --ink-muted: #8a8170;
    --accent: #d4a24c;
    --accent-soft: #e8c98a;
    --line: rgba(243, 236, 225, 0.08);
    --line-strong: rgba(243, 236, 225, 0.16);
    --font-display: "Fraunces", Georgia, serif;
    --font-body: "Manrope", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", "SF Mono", monospace;
    --maxw: 1280px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--font-body); font-weight: 300;
    line-height: 1.55; -webkit-font-smoothing: antialiased;
    overflow-x: hidden; position: relative;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    opacity: 0.08; mix-blend-mode: overlay; z-index: 1;
  }
  body::after {
    content: ""; position: fixed; top: -20%; right: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(212, 162, 76, 0.12) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 32px; position: relative; z-index: 2; }

  /* NAV */
  nav { position: fixed; top:0; left:0; right:0; z-index:50;
    backdrop-filter: blur(20px) saturate(140%);
    background: rgba(15, 13, 11, 0.65);
    border-bottom: 1px solid var(--line); }
  .nav-inner { display:flex; align-items:center; justify-content:space-between;
    padding: 18px 32px; max-width: var(--maxw); margin: 0 auto; }
  .brand { font-family: var(--font-display); font-weight: 400; font-size: 18px; letter-spacing: -0.01em; }
  .brand em { font-style: italic; color: var(--accent); font-weight: 300; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--ink-soft); text-decoration: none; transition: color 0.3s; }
  .nav-links a::before { content: attr(data-num); color: var(--accent); margin-right: 6px; opacity: 0.6; }
  .nav-links a:hover { color: var(--ink); }
  @media (max-width: 720px) { .nav-links { display: none; } }

  /* HERO */
  .hero { min-height: 100vh; display: flex; align-items: center; padding: 120px 0 80px; position: relative; }
  .hero-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
  .hero-meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ink-muted);
    display: flex; align-items: center; gap: 14px; animation: fadeUp 0.9s 0.1s both; }
  .hero-meta::before { content: ""; width: 40px; height: 1px; background: var(--accent); }
  .hero h1 { font-family: var(--font-display); font-weight: 300;
    font-size: clamp(54px, 11vw, 168px); line-height: 0.92; letter-spacing: -0.04em;
    margin: 28px 0 24px; animation: fadeUp 1s 0.25s both; }
  .hero h1 em { font-style: italic; font-weight: 300; color: var(--accent); }
  .hero-tag { max-width: 620px; font-size: 19px; line-height: 1.6;
    color: var(--ink-soft); font-weight: 300; animation: fadeUp 1s 0.4s both; }
  .hero-tag strong { color: var(--ink); font-weight: 500; }
  .hero-bottom { margin-top: 80px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px;
    padding-top: 28px; border-top: 1px solid var(--line); animation: fadeUp 1s 0.55s both; }
  @media (max-width: 820px) { .hero-bottom { grid-template-columns: repeat(2, 1fr); } }
  .stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; }
  .stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 400; letter-spacing: -0.02em; }
  .stat-val em { font-style: italic; color: var(--accent); }

  /* SECTION HEAD */
  section { padding: 120px 0; position: relative; }
  .section-head { display: grid; grid-template-columns: 80px 1fr; gap: 32px; align-items: baseline;
    margin-bottom: 80px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
  .section-num { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; color: var(--accent); }
  .section-title { font-family: var(--font-display); font-weight: 300;
    font-size: clamp(36px, 5vw, 64px); letter-spacing: -0.025em; line-height: 1; }
  .section-title em { font-style: italic; color: var(--accent); font-weight: 300; }
  @media (max-width: 640px) { .section-head { grid-template-columns: 1fr; gap: 12px; } }

  /* ABOUT */
  .about-grid { display: grid; grid-template-columns: 280px 1fr 1fr; gap: 48px; align-items: start; }
  @media (max-width: 980px) { .about-grid { grid-template-columns: 220px 1fr; } }
  @media (max-width: 720px) { .about-grid { grid-template-columns: 1fr; } }
  .about-photo {
    width: 100%; aspect-ratio: 4/5; overflow: hidden; position: relative;
    border: 1px solid var(--line-strong); background: var(--bg-elev);
  }
  .about-photo img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(100%) contrast(1.05) brightness(0.95);
    transition: filter 0.8s ease, transform 0.8s ease;
  }
  .about-photo::after {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 60%, rgba(212,162,76,0.15) 100%);
    pointer-events: none; opacity: 0.6; transition: opacity 0.6s;
  }
  .about-photo:hover img { filter: grayscale(0%) contrast(1) brightness(1); transform: scale(1.03); }
  .about-photo:hover::after { opacity: 0; }
  .about-lead { font-family: var(--font-display); font-weight: 300;
    font-size: clamp(22px, 2.4vw, 30px); line-height: 1.35; letter-spacing: -0.015em; color: var(--ink); }
  .about-lead em { font-style: italic; color: var(--accent); }
  .about-body { font-size: 15px; color: var(--ink-soft); line-height: 1.75; }
  .about-body p + p { margin-top: 16px; }

  /* METHODOLOGY */
  .method-block { margin-top: 100px; padding-top: 48px; border-top: 1px solid var(--line); }
  .method-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 40px;
    display: flex; align-items: center; gap: 14px; }
  .method-label::before { content: ""; width: 40px; height: 1px; background: var(--accent); }
  .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
  @media (max-width: 820px) { .method-grid { grid-template-columns: 1fr; gap: 40px; } }
  .method-item { position: relative; }
  .method-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; gap: 16px; }
  .method-name { font-family: var(--font-display); font-weight: 400;
    font-size: clamp(28px, 3vw, 38px); letter-spacing: -0.02em; color: var(--ink); }
  .method-years { font-family: var(--font-display); font-weight: 300;
    font-size: clamp(22px, 2.4vw, 30px); letter-spacing: -0.015em; color: var(--accent); }
  .method-years em { font-style: italic; font-size: 0.55em; color: var(--ink-muted);
    margin-left: 4px; letter-spacing: 0.05em; }
  .method-bar { width: 100%; height: 3px; background: var(--line-strong);
    overflow: hidden; position: relative; margin-bottom: 18px; }
  .method-fill { height: 100%; width: 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-soft));
    transition: width 1.4s cubic-bezier(0.65, 0, 0.35, 1); }
  .method-block.in .method-fill { width: var(--w); }
  .method-desc { font-size: 14px; color: var(--ink-soft); line-height: 1.7; max-width: 480px; }

  /* EXPERIENCE */
  .exp-item { display: grid; grid-template-columns: 80px 200px 1fr; gap: 32px;
    padding: 36px 0; border-top: 1px solid var(--line); transition: background 0.4s; }
  .exp-item:last-child { border-bottom: 1px solid var(--line); }
  .exp-item:hover { background: linear-gradient(90deg, transparent, rgba(212, 162, 76, 0.03), transparent); }
  @media (max-width: 820px) { .exp-item { grid-template-columns: 1fr; gap: 12px; } }
  .exp-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--ink-muted); }
  .exp-date { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.05em;
    color: var(--accent); text-transform: uppercase; }
  .exp-role { font-family: var(--font-display); font-weight: 400; font-size: 26px;
    letter-spacing: -0.015em; line-height: 1.15; margin-bottom: 6px; }
  .exp-company { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.05em;
    color: var(--ink-soft); margin-bottom: 18px; text-transform: uppercase; }
  .exp-desc { color: var(--ink-soft); font-size: 14.5px; line-height: 1.7;
    margin-bottom: 16px; max-width: 640px; }
  .exp-list { list-style: none; display: flex; flex-wrap: wrap; gap: 8px 10px; }
  .exp-list li { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-soft);
    padding: 6px 12px; border: 1px solid var(--line-strong); border-radius: 999px;
    background: rgba(243, 236, 225, 0.02); transition: all 0.3s; }
  .exp-list li:hover { border-color: var(--accent); color: var(--accent-soft); }

  /* EDUCATION */
  .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 820px) { .edu-grid { grid-template-columns: 1fr; } }
  .edu-card { padding: 36px; border: 1px solid var(--line-strong); background: var(--bg-elev);
    position: relative; overflow: hidden; transition: all 0.4s ease; }
  .edu-card::before { content: ""; position: absolute; top: 0; left: 0; width: 3px; height: 100%;
    background: var(--accent); transform: scaleY(0); transform-origin: top; transition: transform 0.5s; }
  .edu-card:hover { border-color: var(--accent); }
  .edu-card:hover::before { transform: scaleY(1); }
  .edu-date { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 16px; }
  .edu-degree { font-family: var(--font-display); font-weight: 400; font-size: 24px;
    line-height: 1.25; letter-spacing: -0.015em; margin-bottom: 8px; }
  .edu-degree em { font-style: italic; color: var(--accent); }
  .edu-school { font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft);
    margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.04em; }
  .edu-honors { font-size: 14px; color: var(--ink-soft); padding-top: 18px;
    border-top: 1px solid var(--line); line-height: 1.6; }
  .gpa { display: inline-block; font-family: var(--font-mono); font-size: 11px;
    padding: 3px 10px; background: rgba(212, 162, 76, 0.12); color: var(--accent-soft);
    border-radius: 4px; margin-left: 8px; letter-spacing: 0.05em; }

  /* SKILLS */
  .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; }
  @media (max-width: 820px) { .skills-grid { grid-template-columns: 1fr; gap: 40px; } }
  .skill-cat { border-top: 1px solid var(--line-strong); padding-top: 28px; }
  .skill-cat h3 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
  .skill-list { list-style: none; }
  .skill-list li { font-family: var(--font-display); font-weight: 300; font-size: 22px;
    letter-spacing: -0.01em; padding: 14px 0; border-bottom: 1px solid var(--line);
    color: var(--ink); transition: all 0.3s; cursor: default; position: relative; }
  .skill-list li:hover { color: var(--accent); padding-left: 12px; font-style: italic; }

  /* TRAINING */
  .training-block { margin-top: 80px; padding-top: 48px; border-top: 1px solid var(--line); }
  .training-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  @media (max-width: 720px) { .training-list { grid-template-columns: 1fr; } }
  .training-list li { font-family: var(--font-display); font-weight: 300; font-size: 19px;
    letter-spacing: -0.01em; padding: 18px 0; border-bottom: 1px solid var(--line);
    color: var(--ink); display: flex; align-items: baseline; gap: 18px; transition: all 0.3s; }
  .training-list li:hover { color: var(--accent); padding-left: 10px; }
  .training-year { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--accent); flex-shrink: 0; min-width: 38px; }

  /* PROJECTS */
  .proj-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px;
    background: var(--line-strong); border: 1px solid var(--line-strong); }
  @media (max-width: 720px) { .proj-grid { grid-template-columns: 1fr; } }
  .proj-card { background: var(--bg); padding: 36px 32px; transition: background 0.4s; position: relative; }
  .proj-card:hover { background: var(--bg-elev); }
  .proj-year { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--accent); }
  .proj-title { font-family: var(--font-display); font-weight: 400; font-size: 22px;
    letter-spacing: -0.015em; margin: 14px 0 10px; line-height: 1.25; }
  .proj-desc { font-size: 13.5px; color: var(--ink-soft); line-height: 1.6; }
  .proj-arrow { position: absolute; top: 36px; right: 32px;
    font-family: var(--font-mono); color: var(--ink-muted); transition: all 0.3s; }
  .proj-card:hover .proj-arrow { color: var(--accent); transform: translate(4px, -4px); }

  /* CONTACT */
  .contact { padding: 140px 0 100px; border-top: 1px solid var(--line); }
  .contact-grid { display: grid; grid-template-columns: 80px 1fr; gap: 32px; }
  @media (max-width: 640px) { .contact-grid { grid-template-columns: 1fr; } }
  .contact-num { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; color: var(--accent); }
  .contact h2 { font-family: var(--font-display); font-weight: 300;
    font-size: clamp(48px, 8vw, 110px); line-height: 0.95; letter-spacing: -0.035em; margin-bottom: 48px; }
  .contact h2 em { font-style: italic; color: var(--accent); }
  .contact-links { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; }
  @media (max-width: 640px) { .contact-links { grid-template-columns: 1fr; } }
  .contact-link { display: block; padding: 28px 0; border-top: 1px solid var(--line-strong);
    text-decoration: none; color: var(--ink); transition: all 0.4s; position: relative; }
  .contact-link:hover { padding-left: 16px; }
  .contact-link-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-muted); margin-bottom: 8px; display: block; }
  .contact-link-val { font-family: var(--font-display); font-weight: 400; font-size: 22px; letter-spacing: -0.01em; }
  .contact-link:hover .contact-link-val { color: var(--accent); font-style: italic; }

  /* FOOTER */
  footer { padding: 40px 0; border-top: 1px solid var(--line);
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--ink-muted); text-transform: uppercase; }
  .footer-inner { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 16px; }

  /* Admin link (subtle) — only visible when running locally */
  .admin-link { position: fixed; bottom: 24px; right: 24px; z-index: 100;
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ink-muted); text-decoration: none;
    padding: 10px 14px; background: rgba(15, 13, 11, 0.8); backdrop-filter: blur(10px);
    border: 1px solid var(--line-strong); border-radius: 999px; transition: all 0.3s;
    opacity: 0.4; display: none; }
  .admin-link.is-local { display: inline-flex; }
  .admin-link:hover { opacity: 1; color: var(--accent); border-color: var(--accent); }

  /* Animation */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .reveal.in { opacity: 1; transform: translateY(0); }

  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
</style>
</head>

<!-- Load data -->
<script src="data.js"></script>

<script>
  // ============================================================
  //  RENDER PORTFOLIO FROM window.PORTFOLIO_DATA
  // ============================================================
  const D = window.PORTFOLIO_DATA;
  if (!D) {
    document.body.innerHTML = '<div style="padding:80px;font-family:monospace;color:#d4a24c">Error: data.js not found. Make sure data.js is in the same folder as index.html.</div>';
  } else {
    // Helper: safe HTML escape (allows specific tags)
    const esc = s => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

    // META
    document.getElementById('page-title').textContent = D.meta.site_title;
    document.getElementById('page-desc').setAttribute('content', D.meta.site_description);

    // BRAND
    document.getElementById('nav-brand').innerHTML = `${esc(D.brand.first)} <em>${esc(D.brand.last)}</em>`;

    // HERO
    document.getElementById('hero-meta').textContent = D.hero.meta_line;
    document.getElementById('hero-name').innerHTML = `${esc(D.hero.name_line1)}<br/>${esc(D.hero.name_line2)}<em>.</em>`;
    document.getElementById('hero-tag').innerHTML = `<strong>${esc(D.hero.tagline_strong)}</strong> ${esc(D.hero.tagline_rest)}`;
    document.getElementById('hero-stats').innerHTML = D.hero.stats.map(s => `
      <div>
        <div class="stat-label">${esc(s.label)}</div>
        <div class="stat-val">${s.italic ? `<em>${esc(s.value)}</em>` : esc(s.value)}${s.suffix ? `<em>${esc(s.suffix)}</em>` : ''}</div>
      </div>
    `).join('');

    // ABOUT
    document.getElementById('about-photo').innerHTML = `<img src="${esc(D.hero.photo)}" alt="${esc(D.hero.name_line1)} ${esc(D.hero.name_line2)}" />`;
    // Lead with emphasis word italicized
    let lead = esc(D.about.lead);
    if (D.about.lead_emphasis) {
      lead = lead.replace(esc(D.about.lead_emphasis), `<em>${esc(D.about.lead_emphasis)}</em>`);
    }
    document.getElementById('about-lead').innerHTML = lead;
    document.getElementById('about-body').innerHTML = D.about.paragraphs.map(p => `<p>${esc(p)}</p>`).join('');

    // METHODOLOGY
    document.getElementById('method-label').textContent = D.methodology.label;
    document.getElementById('method-grid').innerHTML = D.methodology.items.map(m => `
      <div class="method-item">
        <div class="method-top">
          <span class="method-name">${esc(m.name)}</span>
          <span class="method-years">${esc(m.years)} <em>${esc(m.years_unit)}</em></span>
        </div>
        <div class="method-bar"><div class="method-fill" style="--w: ${m.percent}%;"></div></div>
        <p class="method-desc">${esc(m.desc)}</p>
      </div>
    `).join('');

    // EXPERIENCE
    document.getElementById('exp-list').innerHTML = D.experience.map((e, i) => `
      <article class="exp-item">
        <div class="exp-num">${String(i + 1).padStart(2, '0')}</div>
        <div><div class="exp-date">${esc(e.date)}</div></div>
        <div>
          <h3 class="exp-role">${esc(e.role)}</h3>
          <div class="exp-company">${esc(e.company)}</div>
          <p class="exp-desc">${esc(e.desc)}</p>
          <ul class="exp-list">${e.tags.map(t => `<li>${esc(t)}</li>`).join('')}</ul>
        </div>
      </article>
    `).join('');

    // EDUCATION
    document.getElementById('edu-grid').innerHTML = D.education.map(e => {
      let degree = esc(e.degree);
      if (e.degree_emphasis) {
        degree = degree.replace(esc(e.degree_emphasis), `<em>${esc(e.degree_emphasis)}</em>`);
      }
      return `
        <div class="edu-card">
          <div class="edu-date">${esc(e.date)}</div>
          <h3 class="edu-degree">${degree}<span class="gpa">${esc(e.gpa)}</span></h3>
          <div class="edu-school">${esc(e.school)}</div>
          <div class="edu-honors">${e.honors /* allow basic HTML like <strong> */}</div>
        </div>
      `;
    }).join('');

    // SKILLS
    document.getElementById('skills-grid').innerHTML = D.skills.map(s => `
      <div class="skill-cat">
        <h3>${esc(s.category)}</h3>
        <ul class="skill-list">${s.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
      </div>
    `).join('');

    // TRAINING
    document.getElementById('training-list').innerHTML = D.training.map(t => `
      <li><span class="training-year">${esc(t.year)}</span> ${esc(t.title)}</li>
    `).join('');

    // PROJECTS
    document.getElementById('proj-grid').innerHTML = D.projects.map(p => `
      <div class="proj-card">
        <div class="proj-year">${esc(p.year)}</div>
        <div class="proj-arrow">↗</div>
        <h3 class="proj-title">${esc(p.title)}</h3>
        <p class="proj-desc">${esc(p.desc)}</p>
      </div>
    `).join('');

    // CONTACT
    let heading = esc(D.contact.heading);
    if (D.contact.heading_emphasis) {
      heading = heading.replace(esc(D.contact.heading_emphasis), `<em>${esc(D.contact.heading_emphasis)}</em>`);
    }
    document.getElementById('contact-heading').innerHTML = heading;
    document.getElementById('contact-links').innerHTML = D.contact.links.map(l => `
      <a class="contact-link" href="${esc(l.href)}" ${l.href.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>
        <span class="contact-link-label">${esc(l.label)}</span>
        <span class="contact-link-val">${esc(l.value)}</span>
      </a>
    `).join('');

    // FOOTER
    document.getElementById('footer-left').textContent = D.footer.left;
    document.getElementById('footer-right').textContent = D.footer.right;
  }

  // Show admin link only when running locally (not on GitHub Pages)
  const isLocal = location.protocol === 'file:' ||
                  location.hostname === 'localhost' ||
                  location.hostname === '127.0.0.1';
  if (isLocal) {
    document.querySelector('.admin-link')?.classList.add('is-local');
  }

  // Scroll-triggered reveals
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  // Subtle parallax on hero name
  const heroH1 = document.querySelector('.hero h1');
  document.addEventListener('mousemove', (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 8;
    const y = (e.clientY / window.innerHeight - 0.5) * 8;
    if (heroH1) heroH1.style.transform = `translate(${x}px, ${y}px)`;
  });
</script>

</body>
</html>
